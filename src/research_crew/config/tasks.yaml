search_news:
  description: "Search the internet for the most relevant articles and news published in the last 7 days on the given topic: {topic}"
  expected_output: "A list of 10 relevant articles with title, URL, and a brief summary for each"
  agent: news_researcher

generate_report:
  description: "Analyze the articles found and create an executive summary highlighting the most important points about {topic}"
  expected_output: "A 500-word executive report covering the key points and trends identified"
  agent: news_researcher
